{% extends "base.html" %}

{% block title %}
<title>เพิ่มข้อมูลประชากร — ICT12367 SPU</title>
{% endblock %}

{% block content %}

<!-- Header -->
<div class="hero-section text-center py-4 px-4 mb-5">
    <div class="position-relative" style="z-index:1;">
        <h2 class="fw-bold mb-2" style="font-size:1.8rem;">
            <i class="bi bi-person-plus me-2" style="color:#60a5fa;"></i>เพิ่มข้อมูลประชากร
        </h2>
        <p style="color:#94a3b8; margin:0;">กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้อง</p>
    </div>
</div>

<!-- Form -->
<div class="row justify-content-center mb-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">

                <form method="post" action="/form">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label">
                            <i class="bi bi-person me-1"></i>ชื่อ-นามสกุล
                        </label>
                        <input type="text" class="form-control form-control-lg"
                               name="name" placeholder="กรอกชื่อ-นามสกุล" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            <i class="bi bi-calendar-event me-1"></i>อายุ
                        </label>
                        <input type="number" class="form-control form-control-lg"
                               name="age" placeholder="กรอกอายุเป็นตัวเลข" min="0" max="150" required>
                    </div>

                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn btn-success btn-lg w-100">
                            <i class="bi bi-check-lg me-2"></i>บันทึกข้อมูล
                        </button>
                        <button type="reset" class="btn btn-outline-secondary btn-lg w-100">
                            <i class="bi bi-arrow-counterclockwise me-2"></i>ล้างค่า
                        </button>
                    </div>
                </form>

            </div>
        </div>

        <!-- Back link -->
        <div class="text-center mt-4">
            <a href="/" style="color:#94a3b8; font-size:0.9rem; text-decoration:none;">
                <i class="bi bi-arrow-left me-1"></i>กลับหน้าแรก
            </a>
        </div>
    </div>
</div>

{% endblock %}
