<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>บันทึกข้อมูลพนักงาน</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 50%, #e0f2f1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.10);
      width: 100%;
      max-width: 480px;
      padding: 2.5rem 2rem;
      background: #fff;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1b5e20;
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .form-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 0.3rem;
    }

    .form-control,
    .form-select {
      border-radius: 8px;
      border: 1.5px solid #c8e6c9;
      padding: 0.55rem 0.85rem;
      font-family: 'Sarabun', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: #43a047;
      box-shadow: 0 0 0 3px rgba(67, 160, 71, 0.15);
      outline: none;
    }

    .btn-submit {
      background-color: #43a047;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Sarabun', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.65rem;
      width: 100%;
      margin-top: 0.5rem;
      transition: background-color 0.2s, transform 0.1s;
    }

    .btn-submit:hover {
      background-color: #388e3c;
    }

    .btn-submit:active {
      transform: scale(0.98);
    }

    .mb-form {
      margin-bottom: 1.2rem;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2 class="card-title">บันทึกข้อมูลพนักงาน</h2>

    <form id="employeeForm" novalidate>

      <!-- Full Name -->
      <div class="mb-form">
        <label for="fullName" class="form-label">Full Name</label>
        <input
          type="text"
          class="form-control"
          id="fullName"
          placeholder="กรอกชื่อ-นามสกุล"
          required
        />
        <div class="invalid-feedback">กรุณากรอกชื่อ-นามสกุล</div>
      </div>

      <!-- Email -->
      <div class="mb-form">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          class="form-control"
          id="email"
          placeholder="example@email.com"
          required
        />
        <div class="invalid-feedback">กรุณากรอก Email ให้ถูกต้อง</div>
      </div>

      <!-- Position -->
      <div class="mb-form">
        <label for="position" class="form-label">Position</label>
        <select class="form-select" id="position" required>
          <option value="" disabled selected>-- เลือกตำแหน่ง --</option>
          <option value="manager">Manager</option>
          <option value="developer">Developer</option>
          <option value="designer">Designer</option>
          <option value="hr">HR</option>
          <option value="accountant">Accountant</option>
        </select>
        <div class="invalid-feedback">กรุณาเลือกตำแหน่ง</div>
      </div>

      <!-- Phone Number -->
      <div class="mb-form">
        <label for="phone" class="form-label">Phone Number</label>
        <input
          type="tel"
          class="form-control"
          id="phone"
          placeholder="0XX-XXX-XXXX"
          pattern="[0-9\-]{9,12}"
          required
        />
        <div class="invalid-feedback">กรุณากรอกเบอร์โทรศัพท์ให้ถูกต้อง</div>
      </div>

      <button type="submit" class="btn-submit">Submit</button>

    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const form = document.getElementById('employeeForm');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (!form.checkValidity()) {
        form.classList.add('was-validated');
        return;
      }

      const data = {
        fullName: document.getElementById('fullName').value,
        email:    document.getElementById('email').value,
        position: document.getElementById('position').value,
        phone:    document.getElementById('phone').value,
      };

      alert(`บันทึกข้อมูลสำเร็จ!\n\nชื่อ: ${data.fullName}\nEmail: ${data.email}\nตำแหน่ง: ${data.position}\nโทร: ${data.phone}`);
      form.reset();
      form.classList.remove('was-validated');
    });
  </script>
</body>
</html>
