{% extends "base.html" %}

{% block title %}
<title>แบบฟอร์มแก้ไขข้อมูลประชากร</title>
{% endblock %}

{% block content %}

<!-- Header -->
<div class="text-center py-4 px-4 rounded-4 text-white mb-5"
     style="background: linear-gradient(135deg, #1a6fc4, #0d3b6e);">
    <h2 class="fw-bold display-5">แบบฟอร์มแก้ไขข้อมูลประชากร</h2>
    <p class="lead">กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้อง</p>
</div>

<!-- Form Card -->
<div class="row justify-content-center mb-5">
    <div class="col-md-6">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-bold">ชื่อ-นามสกุล</label>
                        <input type="text" class="form-control form-control-lg"
                               name="name" value="{{ person.name }}">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">อายุ</label>
                        <input type="number" class="form-control form-control-lg"
                               name="age" value="{{ person.age }}">
                    </div>

                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn btn-success btn-lg w-100">อัปเดตข้อมูล</button>
                        <button type="reset" class="btn btn-danger btn-lg w-100">ล้างข้อมูล</button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

<!-- ปุ่มเชื่อมหน้าอื่น -->
<div class="text-center mb-5">
    <a href="/" class="btn btn-dark btn-lg me-3 px-4">หน้าแรก</a>
</div>

{% endblock %}
